<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>GLITCH://PROTOCOL</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a1a0a;
      font-family: monospace;
      touch-action: none;
    }

    canvas {
      image-rendering: pixelated;
    }

    #dpad {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 14px;
      height: 118px;
      pointer-events: none;
      z-index: 10;
    }

    .touch-btn {
      position: absolute;
      width: 54px;
      height: 54px;
      border: 2px solid rgba(90, 255, 90, 0.65);
      border-radius: 6px;
      background: rgba(0, 40, 0, 0.48);
      color: #9cff9c;
      font: bold 22px monospace;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
    }

    .touch-btn:active {
      background: rgba(100, 255, 100, 0.24);
    }

    [data-action="MOVE_LEFT"] { left: 18px; bottom: 18px; }
    [data-action="MOVE_RIGHT"] { left: 138px; bottom: 18px; }
    [data-action="JUMP"] { left: 78px; bottom: 76px; }
    [data-action="GLITCH_ACTION"] { right: 88px; bottom: 18px; }
    [data-action="PAUSE"] { right: 22px; bottom: 18px; }
  </style>
</head>
<body>
  <div id="dpad">
    <button class="touch-btn" data-action="MOVE_LEFT">←</button>
    <button class="touch-btn" data-action="MOVE_RIGHT">→</button>
    <button class="touch-btn" data-action="JUMP">↑</button>
    <button class="touch-btn" data-action="GLITCH_ACTION">[!]</button>
    <button class="touch-btn" data-action="PAUSE">⏸</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="input.js"></script>
  <script src="save.js"></script>
  <script src="inventory.js"></script>
  <script src="physics.js"></script>
  <script src="level1.js"></script>
  <script src="level2.js"></script>
  <script src="level3.js"></script>
  <script src="level4.js"></script>
  <script src="game.js"></script>
</body>
</html>
